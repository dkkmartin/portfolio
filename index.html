<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="src/styles/scrolldown.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martin Bruun - Portfolio</title>
  </head>
  <body class="h-full">
    <main class="h-full">
      <section class="flex h-full flex-col justify-center">
        <img
          class="image__headshot absolute left-10 top-10 max-w-xs rounded-full drop-shadow-md"
          src="./src/assets/me.jpeg"
          alt="A photo of a Martin Bruun"
        />
        <div class="hero__title flex justify-center gap-10 align-middle">
          <h1 class="h1__hi">Hi</h1>
          <span style="font-size: 100px">&#128075;</span>
        </div>
        <h1 class="hero__martin flex justify-center text-center">I'm Martin</h1>
      </section>
      <section class="section__animation flex flex-col">
        <div>
          <h1 class="">I study web development</h1>
          <h2 class="">At Roskilde Tekniske Skole</h2>
        </div>
      </section>
      <div id="mouse-scroll">
        <div class="mouse">
          <div class="mouse-in"></div>
        </div>
        <div>
          <span class="down-arrow-1"></span>
          <span class="down-arrow-2"></span>
          <span class="down-arrow-3"></span>
        </div>
      </div>
      <div class="fixed bottom-0 h-1 w-full bg-sky-900" id="progress"></div>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
